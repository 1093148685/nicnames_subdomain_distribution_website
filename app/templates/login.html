{% extends "auth_base.html" %}
{% block title %}Sign In — DNS Portal{% endblock %}
{% block auth_content %}
<h1>Welcome back</h1>
<p class="auth-subtitle">Sign in to manage your domains</p>
<div class="form-error" id="formError"></div>
<form id="loginForm" onsubmit="login(event)">
    <div class="form-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" placeholder="your@email.com" required>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="form-submit">Sign In</button>
</form>
<div class="auth-footer">
    Don't have an account? <a href="/auth/register">Sign Up</a>
</div>
<script>
function login(e) {
    e.preventDefault();
    var fd = new FormData(document.getElementById('loginForm'));
    fetch('/api/auth/login', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.success) { location.href = d.redirect; }
        else { showError(d.error || 'Invalid credentials'); }
    })
    .catch(function() { showError('Network error'); });
}
</script>
{% endblock %}
